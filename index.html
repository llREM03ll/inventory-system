<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7a5c3e" />
  <title>Inventory System</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* ── Daily greeting ── */
    .daily-greeting {
      text-align: center; margin-bottom: 18px;
      padding: 16px 14px 14px;
      background: linear-gradient(135deg, #fdf5eb, #f5ede5);
      border-radius: 18px; border: 1px solid #e8d5c4;
    }
    .greeting-msg {
      font-size: 1.08rem; font-weight: 700; color: #5c4631; margin-bottom: 3px;
    }
    .greeting-sub { font-size: 0.78rem; color: #9a7a5e; font-weight: 500; }

    /* ── Resume shift banner ── */
    .resume-banner {
      display: flex; align-items: center; justify-content: space-between;
      background: #fffbf0; border: 1.5px solid #e8c87a;
      border-radius: 14px; padding: 11px 14px; margin-bottom: 18px; gap: 10px;
    }
    .resume-banner-info { flex: 1; min-width: 0; }
    .resume-banner-text { font-size: 0.84rem; font-weight: 700; color: #7a5c3e; }
    .resume-banner-sub  { font-size: 0.72rem; color: #b08060; margin-top: 2px; }
    .resume-banner-btn  {
      background: linear-gradient(135deg, #d4a97c, #7a5c3e); color: #fff;
      border: none; border-radius: 10px; padding: 9px 16px;
      font-weight: 700; font-size: 0.82rem; font-family: inherit;
      cursor: pointer; text-decoration: none; white-space: nowrap;
      transition: all .18s; flex-shrink: 0;
    }
    .resume-banner-btn:hover { background: linear-gradient(135deg, #7a5c3e, #5c4631); transform: translateY(-1px); }

    .damage-note {
      font-size: 0.75rem; color: #b08060; font-weight: 400;
      margin-left: 6px; font-style: italic;
    }
  </style>
</head>
<body class="has-bottom-nav">
  <div class="container">
    <div class="brand">BREWS.CO</div>
    <div class="brand-sub">Inventory System</div>

    <!-- Daily rotating greeting -->
    <div class="daily-greeting" id="dailyGreeting">
      <div class="greeting-msg" id="greetingMsg"></div>
      <div class="greeting-sub" id="greetingSub"></div>
    </div>

    <!-- Resume shift banner — shown only when a shift was recently ended -->
    <div class="resume-banner" id="resumeBanner" style="display:none;">
      <div class="resume-banner-info">
        <div class="resume-banner-text">↩ Unfinished shift detected</div>
        <div class="resume-banner-sub">Orders are saved — you can pick up right where you left off.</div>
      </div>
      <a href="pos.html" class="resume-banner-btn">Resume Shift →</a>
    </div>

    <script>
      // Daily greeting — rotates by calendar day so it changes every day
      const GREETINGS = [
        { msg: "Ready to brew? ☕",                sub: "Let's make today count." },
        { msg: "Good shift starts here 🌅",         sub: "You got this." },
        { msg: "Brew hard, count harder 💪",        sub: "Every cup adds up." },
        { msg: "Let's get brewing! 🧋",             sub: "Track it. Own it." },
        { msg: "Another day, another sip ✨",       sub: "Make it a great one." },
        { msg: "Rise & brew ☕",                    sub: "Time to make it happen." },
        { msg: "Cups don't count themselves 😄",    sub: "Good thing you do." },
        { msg: "Today's a good day to sell out 🎯", sub: "Let's get to work." },
        { msg: "Milk tea season, always 🧋",        sub: "Ready when you are." },
        { msg: "Let's hit that quota! 🚀",          sub: "₱3,000 won't earn itself." },
        { msg: "Freshly brewed and ready ✅",       sub: "Start when you're set." },
        { msg: "One shift at a time 🌟",            sub: "Make it count." },
        { msg: "Shake it, brew it, count it 🎶",   sub: "Let's go!" },
        { msg: "The best cup is the next one ☕",  sub: "Keep going." },
        { msg: "Grind first, chill later 💼",       sub: "Let's have a great shift." },
        { msg: "Small cups, big dreams 🧋",         sub: "You're building something real." },
        { msg: "Consistency hits different ✨",     sub: "Show up and show out." },
        { msg: "Brew goals loading… ☕",            sub: "Almost there, let's go." },
        { msg: "New shift, new wins 🏆",             sub: "Yesterday doesn't count now." },
        { msg: "Keep the cups moving 🚀",           sub: "Revenue doesn't lie." },
        { msg: "Flavor by flavor, shift by shift 🍵", sub: "You're doing great." },
        { msg: "The line won't serve itself 😄",    sub: "Let's brew something amazing." },
        { msg: "Every peso counts 💰",              sub: "Track it carefully today." },
        { msg: "BREWS.CO is open for business ☕",  sub: "Have an amazing shift!" },
        { msg: "You're the barista and the boss 👑", sub: "Act like it." },
        { msg: "Stir things up today 🧋",            sub: "In the best way possible." },
        { msg: "Tally up and get paid 💸",          sub: "Numbers don't lie — let's go." },
        { msg: "Another shift, another story ✨",   sub: "Make it a good one." },
      ];
      const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
      const g = GREETINGS[dayOfYear % GREETINGS.length];
      document.getElementById("greetingMsg").textContent = g.msg;
      document.getElementById("greetingSub").textContent = g.sub;

      // Show resume banner if a shift snapshot exists
      if (localStorage.getItem("brewsResumeShift")) {
        document.getElementById("resumeBanner").style.display = "flex";
      }
    </script>

    <div class="section">
      <h3>Input Cups</h3>
      <div class="row"><label>Medium</label><input type="number" id="beginM" placeholder="Begin"><input type="number" id="endM" placeholder="End"><input type="number" id="tallyMC" placeholder="MC Tally"></div>
      <div class="row"><label>Large</label><input type="number" id="beginL" placeholder="Begin"><input type="number" id="endL" placeholder="End"><input type="number" id="tallyLC" placeholder="LC Tally"></div>
      <div class="row"><label>Small</label><input type="number" id="beginS" placeholder="Begin"><input type="number" id="endS" placeholder="End"><input class="placeholder" disabled></div>
      <div class="row"><label>Hot Coffee</label><input type="number" id="beginHC" placeholder="Begin"><input type="number" id="endHC" placeholder="End"><input class="placeholder" disabled></div>
    </div>

    <div class="section">
      <h3>Damage Cups <span class="damage-note">optional — shown in receipt only, not in sales</span></h3>
      <div class="row"><label>Medium</label><input type="number" id="damageM" placeholder="0"><input class="placeholder" disabled><input class="placeholder" disabled></div>
      <div class="row"><label>Large</label><input type="number" id="damageL" placeholder="0"><input class="placeholder" disabled><input class="placeholder" disabled></div>
      <div class="row"><label>Small</label><input type="number" id="damageS" placeholder="0"><input class="placeholder" disabled><input class="placeholder" disabled></div>
      <div class="row"><label>Hot Coffee</label><input type="number" id="damageHC" placeholder="0"><input class="placeholder" disabled><input class="placeholder" disabled></div>
    </div>

    <div class="section">
      <h3>Expenses &amp; Addons</h3>
      <div id="expensesContainer">
        <div class="expense-row">
          <input type="text" class="exp-name" placeholder="Item name">
          <input type="number" class="exp-price" placeholder="₱0">
          <button type="button" onclick="this.parentElement.remove(); saveInputs();">x</button>
        </div>
      </div>
      <button type="button" class="add-expense-btn" onclick="addExpenseRow()">+ Add Expense</button>
      <div class="row">
        <label>Addons</label>
        <input type="number" id="addons" placeholder="₱0">
        <input class="placeholder" disabled>
        <input class="placeholder" disabled>
      </div>
    </div>

    <div class="button-group">
      <button onclick="calculate()">Compute</button>
      <button onclick="clearAll()" class="secondary">Clear All</button>
    </div>

    <div class="section">
      <div id="results"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/InventorySystem.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/history.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js")
        .then(() => console.log("SW registered"))
        .catch(err => console.error("SW failed", err));
    }
  </script>
  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item active">
      <span class="bottom-nav-icon">🧮</span>
      <span class="bottom-nav-label">Calculate</span>
    </a>
    <a href="pos.html" class="bottom-nav-item bottom-nav-shift">
      <span class="bottom-nav-shift-pill">🧋</span>
      <span class="bottom-nav-label">Start Shift</span>
    </a>
    <a href="calendar.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">📅</span>
      <span class="bottom-nav-label">History</span>
    </a>
  </nav>
</body>
</html>
