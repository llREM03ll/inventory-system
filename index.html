<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7a5c3e" />
  <title>BREWS.CO</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { padding: 0; }
    .home-view {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center;
      min-height: calc(100vh - 70px); padding: 28px 24px 16px;
    }
    .home-logo { text-decoration: none; display: block; margin-bottom: 32px; }
    .home-logo .brand { font-size: 2.1rem; color: #7a5c3e; }
    .home-logo .brand-sub { font-size: 0.7rem; color: #b08060; margin-bottom: 0; }
    .home-card {
      width: 100%; max-width: 400px;
      background: linear-gradient(145deg, #fdf5eb, #f5ede5);
      border: 1.5px solid #e8d5c4; border-radius: 26px;
      padding: 44px 32px 40px;
      box-shadow: 0 6px 32px rgba(122,92,62,0.12); margin-bottom: 14px;
    }
    .home-emoji { font-size: 3.4rem; line-height: 1; margin-bottom: 20px; }
    .home-msg   { font-size: 1.45rem; font-weight: 800; color: #5c4631; line-height: 1.3; margin-bottom: 10px; }
    .home-sub   { font-size: 0.9rem; color: #9a7a5e; font-weight: 500; }
    .home-date  { font-size: 0.7rem; color: #c4a98a; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 18px; }
    .home-resume {
      width: 100%; max-width: 400px; display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
      background: #fffbf0; border: 1.5px solid #e8c87a; border-radius: 16px; padding: 14px 16px;
    }
    .home-resume-info { flex: 1; text-align: left; }
    .home-resume-title { font-size: 0.86rem; font-weight: 700; color: #7a5c3e; }
    .home-resume-sub   { font-size: 0.73rem; color: #b08060; margin-top: 2px; }
    .home-resume-btn {
      flex-shrink: 0; background: linear-gradient(135deg, #d4a97c, #7a5c3e); color: #fff;
      border: none; border-radius: 11px; padding: 10px 16px; font-weight: 700;
      font-size: 0.82rem; font-family: inherit; cursor: pointer; text-decoration: none;
      transition: all .18s; white-space: nowrap;
    }
    .home-resume-btn:hover { background: linear-gradient(135deg, #7a5c3e, #5c4631); transform: translateY(-1px); }
  </style>
</head>
<body class="has-bottom-nav">

  <div class="home-view">
    <a href="index.html" class="home-logo">
      <div class="brand">BREWS.CO</div>
      <div class="brand-sub">Inventory System</div>
    </a>

    <div class="home-card">
      <div class="home-emoji" id="homeEmoji"></div>
      <div class="home-msg"   id="homeMsg"></div>
      <div class="home-sub"   id="homeSub"></div>
    </div>
    <div class="home-date" id="homeDate"></div>

    <div class="home-resume" id="resumeBanner" style="display:none;">
      <div class="home-resume-info">
        <div class="home-resume-title">↩ Unfinished shift saved</div>
        <div class="home-resume-sub">Your orders are safe — pick up right where you left off.</div>
      </div>
      <a href="pos.html" class="home-resume-btn">Resume →</a>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="calculate.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">🧮</span>
      <span class="bottom-nav-label">Calculate</span>
    </a>
    <a href="pos.html" class="bottom-nav-item bottom-nav-shift" id="shiftNavBtn">
      <span class="bottom-nav-shift-pill">🧋</span>
      <span class="bottom-nav-label" id="shiftNavLabel">Shift</span>
    </a>
    <a href="calendar.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">📅</span>
      <span class="bottom-nav-label">History</span>
    </a>
  </nav>
  <script>
    if (localStorage.getItem("brewsShiftActive")) {
      document.getElementById("shiftNavLabel").textContent = "↩ Shift";
      document.getElementById("shiftNavBtn").title = "Return to active shift";
    }
  </script>

  <script>
    const GREETINGS = [
      { e:"☕", msg:"Ready to brew?",                    sub:"Let's make today count."           },
      { e:"🌅", msg:"Good shift starts here",            sub:"You got this."                     },
      { e:"💪", msg:"Brew hard, count harder",           sub:"Every cup adds up."                },
      { e:"🧋", msg:"Let's get brewing!",                sub:"Track it. Own it."                 },
      { e:"✨", msg:"Another day, another sip",          sub:"Make it a great one."              },
      { e:"☕", msg:"Rise & brew",                       sub:"Time to make it happen."           },
      { e:"😄", msg:"Cups don't count themselves",       sub:"Good thing you do."               },
      { e:"🎯", msg:"Today's a good day to sell out",    sub:"Let's get to work."               },
      { e:"🧋", msg:"Milk tea season, always",           sub:"Ready when you are."              },
      { e:"🚀", msg:"Let's hit that quota!",             sub:"₱3,000 won't earn itself."        },
      { e:"✅", msg:"Freshly brewed and ready",          sub:"Start when you're set."           },
      { e:"🌟", msg:"One shift at a time",               sub:"Make it count."                   },
      { e:"🎶", msg:"Shake it, brew it, count it",       sub:"Let's go!"                        },
      { e:"☕", msg:"The best cup is the next one",      sub:"Keep going."                      },
      { e:"💼", msg:"Grind first, chill later",          sub:"Let's have a great shift."        },
      { e:"🧋", msg:"Small cups, big dreams",            sub:"You're building something real."  },
      { e:"✨", msg:"Consistency hits different",        sub:"Show up and show out."            },
      { e:"☕", msg:"Brew goals loading…",               sub:"Almost there, let's go."          },
      { e:"🏆", msg:"New shift, new wins",               sub:"Yesterday doesn't count now."     },
      { e:"🚀", msg:"Keep the cups moving",              sub:"Revenue doesn't lie."             },
      { e:"🍵", msg:"Flavor by flavor, shift by shift",  sub:"You're doing great."              },
      { e:"😄", msg:"The line won't serve itself",       sub:"Let's brew something amazing."    },
      { e:"💰", msg:"Every peso counts",                 sub:"Track it carefully today."        },
      { e:"☕", msg:"BREWS.CO is open for business",     sub:"Have an amazing shift!"           },
      { e:"👑", msg:"You're the barista and the boss",   sub:"Act like it."                     },
      { e:"🧋", msg:"Stir things up today",              sub:"In the best way possible."        },
      { e:"💸", msg:"Tally up and get paid",             sub:"Numbers don't lie — let's go."   },
      { e:"✨", msg:"Another shift, another story",      sub:"Make it a good one."              },
    ];
    const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
    const g = GREETINGS[dayOfYear % GREETINGS.length];
    document.getElementById("homeEmoji").textContent = g.e;
    document.getElementById("homeMsg").textContent   = g.msg;
    document.getElementById("homeSub").textContent   = g.sub;
    document.getElementById("homeDate").textContent  = new Date().toLocaleDateString("en-PH", {
      weekday:"long", year:"numeric", month:"long", day:"numeric"
    });
    if (localStorage.getItem("brewsResumeShift"))
      document.getElementById("resumeBanner").style.display = "flex";

    // Mark session so other pages don't redirect back here on direct load
    sessionStorage.setItem('brewsSession', '1');

    if ("serviceWorker" in navigator)
      navigator.serviceWorker.register("service-worker.js");
  </script>
</body>
</html>
