<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="theme-color" content="#6b4f36" />
  <title>BREWS.CO</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { padding: 0; }

    .home-view {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center;
      min-height: 100vh; padding: 28px 24px 24px;
    }
    body.has-bottom-nav .home-view { min-height: calc(100vh - 70px); }

    .home-logo { text-decoration: none; display: block; margin-bottom: 28px; }
    .home-logo .brand     { font-size: 2.2rem; color: var(--espresso); letter-spacing: 0.20em; }
    .home-logo .brand-sub { font-size: 0.62rem; color: var(--dust); margin-bottom: 0; }

    .settings-fab {
      position: fixed; top: 16px; right: 16px; z-index: 200;
      background: rgba(253,245,232,0.94); border: 1.5px solid var(--latte);
      border-radius: var(--radius-lg); padding: 9px 14px; font-size: 0.80rem; font-weight: 700;
      color: var(--mahogany); font-family: "Plus Jakarta Sans", sans-serif; cursor: pointer;
      backdrop-filter: blur(10px); transition: all .18s;
      box-shadow: 0 2px 10px rgba(60,20,0,0.10);
    }
    .settings-fab:hover { background: var(--parchment); transform: translateY(-1px); box-shadow: var(--shadow-warm); }

    .home-card {
      width: 100%; max-width: 400px;
      background: var(--grad-card);
      border: 1.5px solid var(--latte); border-radius: 26px;
      padding: 44px 32px 40px;
      box-shadow: var(--shadow-card); margin-bottom: 14px;
      position: relative; overflow: hidden;
    }
    .home-card::before { content:""; position:absolute; top:0;left:0;right:0;height:3px;background:var(--grad-cta); }
    .home-card::after  { content:"☕"; position:absolute;bottom:-12px;right:-2px;font-size:6rem;opacity:0.04;transform:rotate(-12deg);pointer-events:none; }

    .home-emoji { font-size: 3.4rem; line-height: 1; margin-bottom: 20px; }
    .home-msg   { font-family:"Cormorant Garamond",serif; font-size:1.55rem; font-weight:700; color:var(--espresso); line-height:1.25; margin-bottom:10px; }
    .home-sub   { font-size:0.9rem; color:var(--bark); font-weight:500; }
    .home-date  { font-size:0.65rem; color:var(--dust); font-weight:600; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:18px; }

    .home-resume {
      width:100%; max-width:400px; display:flex; align-items:center;
      justify-content:space-between; gap:12px;
      background:#FFFBEE; border:1.5px solid #E8C87A;
      border-radius:var(--radius-lg); padding:14px 16px; margin-bottom:14px;
    }
    .home-resume-info  { flex:1; text-align:left; }
    .home-resume-title { font-size:0.86rem; font-weight:700; color:var(--mahogany); }
    .home-resume-sub   { font-size:0.73rem; color:var(--bark); margin-top:2px; }
    .home-resume-btn {
      flex-shrink:0; background:var(--grad-cta); color:#fff;
      border:none; border-radius:var(--radius-md); padding:10px 16px; font-weight:700;
      font-size:0.82rem; font-family:"Plus Jakarta Sans",sans-serif; cursor:pointer;
      text-decoration:none; transition:all .18s; white-space:nowrap; box-shadow:var(--shadow-btn);
    }
    .home-resume-btn:hover { filter:brightness(1.08); transform:translateY(-1px); }

    .view-history-btn {
      width:100%; max-width:400px; display:flex; align-items:center;
      justify-content:center; gap:8px; margin-top:14px;
      background:var(--grad-cta); color:#fff;
      border:none; border-radius:var(--radius-lg); padding:15px 20px;
      font-size:0.92rem; font-weight:700; font-family:"Plus Jakarta Sans",sans-serif;
      cursor:pointer; text-decoration:none; transition:all .18s; box-shadow:var(--shadow-btn);
    }
    .view-history-btn:hover { filter:brightness(1.08); transform:translateY(-1px); }

    /* ── Sync card ── */
    .sync-card {
      width:100%; max-width:400px; margin-top:14px;
      background:var(--pearl); border:1.5px solid var(--latte);
      border-radius:var(--radius-lg); padding:14px 16px;
      box-shadow:0 1px 6px rgba(60,20,0,0.06);
    }
    .sync-row { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
    .sync-status { display:flex; align-items:center; gap:7px; font-size:0.72rem; color:var(--bark); font-weight:600; }
    .sync-dot { width:8px; height:8px; border-radius:50%; background:var(--mochaccino); flex-shrink:0; transition:background .3s; }
    .sync-dot.ok    { background:#6ab86a; }
    .sync-dot.busy  { background:var(--honey); animation:pulse .8s infinite; }
    .sync-dot.error { background:var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .sync-role-badge { font-size:0.66rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:3px 10px; border-radius:var(--radius-pill); flex-shrink:0; }
    .sync-role-badge.worker  { background:var(--parchment); color:var(--bark); border:1px solid var(--latte); }
    .sync-role-badge.manager { background:#e0f0e0; color:#3a7a3a; border:1px solid #b8ddb8; }
    .sync-btns { display:flex; gap:8px; }
    .sync-btn { flex:1; padding:9px 10px; border-radius:var(--radius-md); font-size:0.82rem; font-weight:700; font-family:"Plus Jakarta Sans",sans-serif; cursor:pointer; border:none; transition:all .18s; text-align:center; }
    .sync-btn-push { background:var(--grad-cta); color:#fff; box-shadow:var(--shadow-btn); }
    .sync-btn-push:hover { filter:brightness(1.08); transform:translateY(-1px); }
    .sync-btn-pull { background:var(--parchment); color:var(--mahogany); border:1.5px solid var(--latte); }
    .sync-btn-pull:hover { background:var(--latte); transform:translateY(-1px); }
    .sync-btn:disabled { opacity:0.5; cursor:default; transform:none; }

    /* ── Settings modal ── */
    .smodal-overlay {
      position:fixed; inset:0; z-index:500;
      background:rgba(28,10,0,0.55); backdrop-filter:blur(5px);
      display:flex; align-items:flex-end; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity .22s;
    }
    .smodal-overlay.open { opacity:1; pointer-events:all; }
    .smodal {
      background:var(--cream); width:100%; max-width:720px;
      border-radius:24px 24px 0 0; max-height:92vh;
      display:flex; flex-direction:column;
      box-shadow:0 -8px 40px rgba(28,10,0,0.25); border-top:1.5px solid var(--latte);
      transform:translateY(24px); transition:transform .26s;
    }
    .smodal-overlay.open .smodal { transform:translateY(0); }
    .smodal-handle { width:36px; height:4px; background:var(--latte); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
    .smodal-head { display:flex; align-items:center; justify-content:space-between; padding:14px 20px 12px; border-bottom:1px solid var(--latte); flex-shrink:0; }
    .smodal-title { font-family:"Cormorant Garamond",serif; font-size:1.15rem; font-weight:700; color:var(--espresso); letter-spacing:0.04em; }
    .smodal-actions { display:flex; gap:8px; }
    .smodal-reset { background:#fdf0f0; border:1.5px solid #f0c8c8; border-radius:var(--radius-md); padding:8px 13px; font-size:0.82rem; font-weight:700; color:var(--danger); font-family:"Plus Jakarta Sans",sans-serif; cursor:pointer; }
    .smodal-reset:hover { background:#fae0de; }
    .smodal-done { background:var(--grad-cta); color:#fff; border:none; border-radius:var(--radius-md); padding:8px 16px; font-size:0.82rem; font-weight:700; font-family:"Plus Jakarta Sans",sans-serif; cursor:pointer; box-shadow:var(--shadow-btn); }
    .smodal-done:hover { filter:brightness(1.08); }
    .smodal-body { overflow-y:auto; padding:16px 20px 32px; flex:1; }
    .smodal-section { margin-bottom:24px; }
    .smodal-section-title { font-size:0.62rem; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--bark); border-bottom:1px solid var(--latte); padding-bottom:7px; margin-bottom:12px; }
    .smodal-grid  { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .smodal-grid-3{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .smodal-field { display:flex; flex-direction:column; gap:4px; }
    .smodal-label { font-size:0.72rem; font-weight:600; color:var(--bark); }
    .smodal-input { padding:9px 11px; border:1.5px solid var(--latte); border-radius:var(--radius-md); font-size:0.88rem; font-family:"Plus Jakarta Sans",sans-serif; background:var(--pearl); color:var(--roast); width:100%; box-sizing:border-box; transition:border-color .16s; }
    .smodal-input:focus { outline:none; border-color:var(--caramel); background:#fff; box-shadow:0 0 0 3px rgba(196,129,58,0.14); }
    .smodal-input:disabled { background:var(--parchment); color:var(--dust); border-color:var(--latte); cursor:not-allowed; }
    .settings-locked-banner { background:#fdf5e0; border:1.5px solid #e8d5a0; border-radius:var(--radius-lg); padding:12px 14px; margin-bottom:18px; font-size:0.82rem; color:#8a6a20; line-height:1.55; text-align:center; }

    .role-toggle { display:flex; gap:8px; margin-bottom:10px; }
    .role-btn { flex:1; padding:10px 14px; border-radius:var(--radius-md); font-size:0.84rem; font-weight:700; font-family:"Plus Jakarta Sans",sans-serif; cursor:pointer; transition:all .16s; text-align:center; }
    .role-btn.active { background:var(--grad-cta); color:#fff; border:none; box-shadow:var(--shadow-btn); }
    .role-btn:not(.active) { background:var(--parchment); color:var(--mahogany); border:1.5px solid var(--latte); }
    .role-btn:not(.active):hover { background:var(--latte); }
    .role-notice { font-size:0.76rem; line-height:1.55; padding:9px 12px; border-radius:var(--radius-md); }
    .role-notice.worker  { background:var(--pearl); border:1px solid var(--latte); color:var(--bark); }
    .role-notice.manager { background:#f0f7f0; border:1px solid #b8ddb8; color:#3a7a3a; }

    .sflavor-cat { margin-bottom:16px; }
    .sflavor-cat-title { font-size:0.72rem; font-weight:700; color:var(--mahogany); margin-bottom:7px; }
    .sflavor-pills { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:7px; }
    .sflavor-pill { display:flex; align-items:center; gap:5px; background:var(--parchment); border:1.5px solid var(--latte); border-radius:var(--radius-pill); padding:5px 10px; font-size:0.76rem; font-weight:600; color:var(--roast); }
    .sflavor-pill-del { background:none; border:none; color:var(--danger); font-size:0.82rem; cursor:pointer; padding:0 2px; line-height:1; font-weight:800; }
    .sflavor-add-row { display:flex; gap:7px; }
    .sflavor-add-input { flex:1; padding:8px 11px; border:1.5px solid var(--latte); border-radius:var(--radius-md); font-size:0.84rem; font-family:"Plus Jakarta Sans",sans-serif; background:var(--pearl); color:var(--roast); }
    .sflavor-add-input:focus { outline:none; border-color:var(--caramel); }
    .sflavor-add-btn { background:var(--grad-cta); color:#fff; border:none; border-radius:var(--radius-md); padding:8px 14px; font-size:0.82rem; font-weight:700; font-family:"Plus Jakarta Sans",sans-serif; cursor:pointer; }
  </style>
</head>
<body class="has-bottom-nav">

  <button class="settings-fab" onclick="openSettings()">⚙️ Settings</button>

  <div class="home-view">
    <a href="index.html" class="home-logo">
      <div class="brand">BREWS.CO</div>
      <div class="brand-sub" id="homeRoleSub">Inventory System</div>
    </a>

    <div class="home-card">
      <div class="home-emoji" id="homeEmoji"></div>
      <div class="home-msg"   id="homeMsg"></div>
      <div class="home-sub"   id="homeSub"></div>
    </div>
    <div class="home-date" id="homeDate"></div>

    <!-- Worker only: resume banner -->
    <div class="home-resume" id="resumeBanner" style="display:none;">
      <div class="home-resume-info">
        <div class="home-resume-title">↩ Unfinished shift saved</div>
        <div class="home-resume-sub">Your orders are safe — pick up right where you left off.</div>
      </div>
      <a href="pos.html" class="home-resume-btn">Resume →</a>
    </div>

    <!-- Manager only: View History button -->
    <a href="calendar.html" class="view-history-btn" id="viewHistoryBtn" style="display:none;">
      📅 View History &amp; Reports →
    </a>

    <!-- Sync card -->
    <div class="sync-card">
      <div class="sync-row">
        <div class="sync-status">
          <span class="sync-dot" id="syncDot"></span>
          <span id="syncStatusText">Not synced yet</span>
        </div>
        <span class="sync-role-badge worker" id="syncRoleBadge">Worker</span>
      </div>
      <div class="sync-btns">
        <button class="sync-btn sync-btn-push" id="syncPushBtn" onclick="doSync('push')">☁️ Push Data</button>
        <button class="sync-btn sync-btn-pull" id="syncPullBtn" onclick="doSync('pull')">⬇️ Pull from Cloud</button>
      </div>
    </div>
  </div>

  <!-- ═══════════ SETTINGS MODAL ═══════════ -->
  <div class="smodal-overlay" id="settingsModal" onclick="handleSettingsOverlay(event)">
    <div class="smodal">
      <div class="smodal-handle"></div>
      <div class="smodal-head">
        <span class="smodal-title">⚙️ Settings</span>
        <div class="smodal-actions">
          <button class="smodal-reset" id="smodal-reset-btn" onclick="confirmResetSettings()">↺ Reset</button>
          <button class="smodal-done"  id="smodal-save-btn"  onclick="saveAndCloseSettings()">Save ✓</button>
        </div>
      </div>
      <div class="smodal-body" id="settingsBody"></div>
    </div>
  </div>

  <!-- Worker bottom nav (hidden for managers via JS) -->
  <nav class="bottom-nav" id="bottomNav">
    <a href="calculate.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">🧮</span>
      <span class="bottom-nav-label">Calculate</span>
    </a>
    <a href="pos.html" class="bottom-nav-item bottom-nav-shift" id="shiftNavBtn">
      <span class="bottom-nav-shift-pill">🧋</span>
      <span class="bottom-nav-label" id="shiftNavLabel">Shift</span>
    </a>
    <a href="calendar.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">📅</span>
      <span class="bottom-nav-label">History</span>
    </a>
  </nav>

  <script src="js/settings.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" onerror="console.warn('Firebase CDN unavailable')"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js" onerror="console.warn('Firebase CDN unavailable')"></script>
  <script>
    window.syncPush           = async function() { throw new Error("Sync not available."); };
    window.syncPull           = async function() { throw new Error("Sync not available."); };
    window.getLastSyncDisplay = () => null;
    window.getDeviceRole      = () => localStorage.getItem("brewsDeviceRole") || "worker";
    window.setDeviceRole      = (r) => localStorage.setItem("brewsDeviceRole", r === "manager" ? "manager" : "worker");
  </script>
  <script src="js/sync.js" onerror="console.warn('sync.js not found')"></script>

  <script>
    // ── Role-based UI on load ──────────────────────────────────────────────────
    (function applyRole() {
      const role      = getDeviceRole();
      const isManager = role === "manager";
      const nav       = document.getElementById("bottomNav");
      const resume    = document.getElementById("resumeBanner");
      const viewHist  = document.getElementById("viewHistoryBtn");
      const roleSub   = document.getElementById("homeRoleSub");

      if (isManager) {
        // Hide worker nav + resume banner; show history button
        if (nav)    { nav.style.display = "none"; document.body.classList.remove("has-bottom-nav"); }
        if (resume) resume.style.display = "none";
        if (viewHist) viewHist.style.display = "flex";
        if (roleSub)  roleSub.textContent = "Manager View";
      } else {
        // Worker
        if (resume && localStorage.getItem("brewsResumeShift")) resume.style.display = "flex";
        if (localStorage.getItem("brewsShiftActive")) {
          document.getElementById("shiftNavLabel").textContent = "↩ Shift";
        }
      }
    })();

    // ── Sync UI ────────────────────────────────────────────────────────────────
    function setSyncUI(state, msg) {
      document.getElementById("syncDot").className = "sync-dot " + (state || "");
      document.getElementById("syncStatusText").textContent = msg;
      const busy = state === "busy";
      document.getElementById("syncPushBtn").disabled = busy;
      document.getElementById("syncPullBtn").disabled = busy;
    }

    function updateSyncCard() {
      const role  = getDeviceRole();
      const badge = document.getElementById("syncRoleBadge");
      const push  = document.getElementById("syncPushBtn");
      badge.textContent = role === "manager" ? "Manager" : "Worker";
      badge.className   = "sync-role-badge " + role;
      push.textContent  = role === "manager" ? "⚙️ Push Settings" : "☁️ Push Data";
    }

    function initSyncDisplay() {
      const last = getLastSyncDisplay();
      setSyncUI(last ? "ok" : "", last ? "Last synced " + last : "Not synced yet");
      updateSyncCard();
    }

    async function doSync(direction) {
      if (direction === "push") {
        const role = getDeviceRole();
        const what = role === "manager"
          ? "settings (prices, salary, flavors) — history is untouched"
          : "shift data (history, orders) — settings are untouched";
        if (!confirm("⚠️ Push to Cloud?\n\nThis updates the cloud with this device's " + what + ".\n\nContinue?")) return;
      }
      setSyncUI("busy", direction === "push" ? "Pushing…" : "Pulling…");
      try {
        if (direction === "push") { await syncPush(); setSyncUI("ok", "Pushed " + getLastSyncDisplay()); }
        else                      { await syncPull(); setSyncUI("ok", "Pulled " + getLastSyncDisplay()); }
      } catch (e) {
        setSyncUI("error", "⚠ " + (e.message || "Sync failed"));
        setTimeout(initSyncDisplay, 4000);
      }
    }

    // Auto-pull (role-aware inside syncPull)
    const AUTO_PULL_MS = 3 * 60 * 1000;
    async function autoPull() {
      if (localStorage.getItem("brewsShiftActive")) return;
      setSyncUI("busy", "Auto-syncing…");
      try { await syncPull(); setSyncUI("ok", "Auto-synced " + getLastSyncDisplay()); updateSyncCard(); }
      catch (e) { setSyncUI("error", "⚠ Auto-sync failed"); setTimeout(initSyncDisplay, 3000); }
    }

    initSyncDisplay();
    setTimeout(autoPull, 1500);
    setInterval(autoPull, AUTO_PULL_MS);
  </script>

  <script>
    // ── Settings modal ─────────────────────────────────────────────────────────
    const CAT_LABELS = { milktea:"Milk Tea", fruittea:"Fruit Tea", icedcoffee:"Iced Coffee", hotcoffee:"Hot Coffee" };
    let _ws = null;

    function openSettings() {
      _ws = JSON.parse(JSON.stringify(getSettings()));
      renderSettingsModal();
      document.getElementById("settingsModal").classList.add("open");
    }
    function closeSettings() { document.getElementById("settingsModal").classList.remove("open"); }
    function handleSettingsOverlay(e) { if (e.target === document.getElementById("settingsModal")) closeSettings(); }

    function confirmResetSettings() {
      if (getDeviceRole() !== "manager") return;
      if (!confirm("Reset all settings to defaults? This cannot be undone.")) return;
      resetSettings(); _ws = JSON.parse(JSON.stringify(getSettings())); renderSettingsModal();
    }

    function saveAndCloseSettings() {
      if (getDeviceRole() === "manager") { collectFromUI(); saveSettings(_ws); }
      closeSettings(); updateSyncCard();
    }

    function setLocalRole(role) {
      setDeviceRole(role); renderSettingsModal(); updateSyncCard();
      // Re-apply role UI without full reload
      const isManager = role === "manager";
      const nav     = document.getElementById("bottomNav");
      const resume  = document.getElementById("resumeBanner");
      const viewHist= document.getElementById("viewHistoryBtn");
      const roleSub = document.getElementById("homeRoleSub");
      if (isManager) {
        if (nav) { nav.style.display = "none"; document.body.classList.remove("has-bottom-nav"); }
        if (resume)   resume.style.display = "none";
        if (viewHist) viewHist.style.display = "flex";
        if (roleSub)  roleSub.textContent = "Manager View";
      } else {
        if (nav) { nav.style.display = "flex"; document.body.classList.add("has-bottom-nav"); }
        if (resume && localStorage.getItem("brewsResumeShift")) resume.style.display = "flex";
        if (viewHist) viewHist.style.display = "none";
        if (roleSub)  roleSub.textContent = "Inventory System";
      }
    }

    function n(id) { return parseFloat(document.getElementById(id)?.value) || 0; }

    function collectFromUI() {
      _ws.prices = { M:n("sp_M"),L:n("sp_L"),S:n("sp_S"),MC:n("sp_MC"),LC:n("sp_LC"),HC:n("sp_HC"),FTM:n("sp_FTM"),FTL:n("sp_FTL") };
      _ws.addonPrices = {};
      document.querySelectorAll(".saddon-row").forEach(r => {
        const name = r.querySelector(".saddon-name")?.value?.trim();
        const price = parseFloat(r.querySelector(".saddon-price")?.value) || 0;
        if (name) _ws.addonPrices[name] = price;
      });
      _ws.salaryBase           = n("sp_salaryBase");
      _ws.salaryBonusThreshold = n("sp_bonusThreshold");
      _ws.salaryBonusPerK      = n("sp_bonusPerK");
      _ws.quotaStart           = n("sp_quotaStart");
      _ws.lowStock             = n("sp_lowStock");
    }

    function addFlavorToCategory(cat) {
      if (getDeviceRole() !== "manager") return;
      const input = document.getElementById("sfi_" + cat);
      const val   = input?.value?.trim();
      if (!val) return;
      if (!_ws.flavors[cat]) _ws.flavors[cat] = [];
      if (!_ws.flavors[cat].includes(val)) { _ws.flavors[cat].push(val); renderFlavorCat(cat); }
      input.value = "";
    }

    function removeFlavorFromCategory(cat, flavor) {
      if (getDeviceRole() !== "manager") return;
      _ws.flavors[cat] = (_ws.flavors[cat] || []).filter(f => f !== flavor);
      renderFlavorCat(cat);
    }

    function renderFlavorCat(cat) {
      const c = document.getElementById("sfcat_" + cat);
      if (!c) return;
      const isManager = getDeviceRole() === "manager";
      const flavors = _ws.flavors[cat] || [];
      c.querySelector(".sflavor-pills").innerHTML = flavors.length
        ? flavors.map(f => `<span class="sflavor-pill">${f}${isManager
            ? `<button class="sflavor-pill-del" onclick="removeFlavorFromCategory('${cat}','${f.replace(/'/g,"\\'")}')">✕</button>`
            : ""}</span>`).join("")
        : `<span style="font-size:0.76rem;color:var(--mochaccino);">No flavors added</span>`;
    }

    function fi(id, label, val, locked) {
      return `<div class="smodal-field"><label class="smodal-label">${label}</label>
        <input class="smodal-input" id="${id}" type="number" value="${val}"${locked?" disabled":""}></div>`;
    }

    function renderSettingsModal() {
      const s = _ws, role = getDeviceRole(), isManager = role === "manager", locked = !isManager;

      document.getElementById("smodal-save-btn").style.display  = isManager ? "" : "none";
      document.getElementById("smodal-reset-btn").style.display = isManager ? "" : "none";

      const roleSection = `
        <div class="smodal-section">
          <div class="smodal-section-title">Device Role</div>
          <div class="role-toggle">
            <button class="role-btn${!isManager?" active":""}" onclick="setLocalRole('worker')">👷 Worker</button>
            <button class="role-btn${isManager?" active":""}"  onclick="setLocalRole('manager')">👔 Manager</button>
          </div>
          <div class="role-notice ${role}">
            ${isManager
              ? "✓ <strong>Manager mode</strong> — You can edit all settings. Push sends prices, salary &amp; flavors to all devices. You only see Calendar &amp; History."
              : "👷 <strong>Worker mode</strong> — Settings are view-only. Push sends shift data (history &amp; orders) to the cloud."}
          </div>
        </div>`;

      const lockedBanner = locked ? `<div class="settings-locked-banner">🔒 Settings are managed by the Manager device.<br>Switch to Manager mode above to make changes.</div>` : "";

      const addonRows = Object.entries(s.addonPrices).map(([name, price]) => `
        <div class="expense-row saddon-row">
          <input class="smodal-input saddon-name"  type="text"   value="${name}"  placeholder="Add-on name"${locked?" disabled":""}>
          <input class="smodal-input saddon-price" type="number" value="${price}" placeholder="₱0"${locked?" disabled":""}>
          ${!locked?`<button type="button" onclick="this.parentElement.remove();">✕</button>`:""}
        </div>`).join("");

      const addAddonBtn = !locked ? `<button class="add-expense-btn" style="margin-top:8px;"
        onclick="document.getElementById('saddonContainer').insertAdjacentHTML('beforeend',
          \`<div class='expense-row saddon-row'>
            <input class='smodal-input saddon-name' type='text' placeholder='Add-on name'>
            <input class='smodal-input saddon-price' type='number' placeholder='₱0'>
            <button type='button' onclick='this.parentElement.remove();'>✕</button>
          </div>\`);">+ Add Add-on</button>` : "";

      const flavorHTML = Object.entries(CAT_LABELS).map(([cat, label]) => `
        <div class="sflavor-cat" id="sfcat_${cat}">
          <div class="sflavor-cat-title">${label}</div>
          <div class="sflavor-pills"></div>
          ${!locked?`<div class="sflavor-add-row" style="margin-top:6px;">
            <input class="sflavor-add-input" id="sfi_${cat}" type="text" placeholder="Add flavor…"
              onkeydown="if(event.key==='Enter'){addFlavorToCategory('${cat}');event.preventDefault();}">
            <button class="sflavor-add-btn" onclick="addFlavorToCategory('${cat}')">+ Add</button>
          </div>`:""}
        </div>`).join("");

      document.getElementById("settingsBody").innerHTML = roleSection + lockedBanner + `
        <div class="smodal-section">
          <div class="smodal-section-title">Drink Prices (₱)</div>
          <div class="smodal-grid">
            ${fi("sp_M","Milktea M",s.prices.M,locked)}${fi("sp_L","Milktea L",s.prices.L,locked)}
            ${fi("sp_S","Milktea S",s.prices.S,locked)}${fi("sp_MC","Iced Coffee M",s.prices.MC,locked)}
            ${fi("sp_LC","Iced Coffee L",s.prices.LC,locked)}${fi("sp_HC","Hot Coffee",s.prices.HC,locked)}
            ${fi("sp_FTM","Fruit Tea M",s.prices.FTM,locked)}${fi("sp_FTL","Fruit Tea L",s.prices.FTL,locked)}
          </div>
        </div>
        <div class="smodal-section">
          <div class="smodal-section-title">Add-on Prices (₱)</div>
          <div id="saddonContainer">${addonRows}</div>${addAddonBtn}
        </div>
        <div class="smodal-section">
          <div class="smodal-section-title">Salary &amp; Bonus</div>
          <div class="smodal-grid-3">
            ${fi("sp_salaryBase","Base Salary (₱)",s.salaryBase,locked)}
            ${fi("sp_bonusThreshold","Bonus Threshold (₱)",s.salaryBonusThreshold,locked)}
            ${fi("sp_bonusPerK","Bonus per ₱1,000 (₱)",s.salaryBonusPerK,locked)}
          </div>
          <div style="font-size:0.72rem;color:var(--dust);margin-top:8px;line-height:1.5;">Staff earns the base salary when cup sales meet or exceed it. Once sales hit the bonus threshold, the bonus kicks in — plus that same amount for every extra ₱1,000.</div>
        </div>
        <div class="smodal-section">
          <div class="smodal-section-title">Quota &amp; Low Stock</div>
          <div class="smodal-grid">
            ${fi("sp_quotaStart","Quota Toast at (₱)",s.quotaStart,locked)}
            ${fi("sp_lowStock","Low Stock Warning (cups)",s.lowStock,locked)}
          </div>
        </div>
        <div class="smodal-section">
          <div class="smodal-section-title">Flavors</div>
          ${locked?`<div style="font-size:0.76rem;color:var(--dust);margin-bottom:12px;">Managed by the Manager device.</div>`
                  :`<div style="font-size:0.76rem;color:var(--bark);margin-bottom:12px;">Add or remove flavors per drink category.</div>`}
          ${flavorHTML}
        </div>`;

      Object.keys(CAT_LABELS).forEach(cat => renderFlavorCat(cat));
    }
  </script>

  <script>

    ];
    const MANAGER_GREETINGS = [
      {e:"👔",msg:"Welcome back, Manager",sub:"Pull the latest and check the numbers."},
      {e:"📊",msg:"How's the shop doing?",sub:"Pull to see the latest from your team."},
      {e:"📋",msg:"Reports are ready",sub:"Pull from cloud to see today's shift."},

    ];

    const role = getDeviceRole();
    const list = role === "manager" ? MANAGER_GREETINGS : GREETINGS;
    const g    = list[Math.floor(Math.random() * list.length)];
    document.getElementById("homeEmoji").textContent = g.e;
    document.getElementById("homeMsg").textContent   = g.msg;
    document.getElementById("homeSub").textContent   = g.sub;
    document.getElementById("homeDate").textContent  = new Date().toLocaleDateString("en-PH", {
      weekday:"long", year:"numeric", month:"long", day:"numeric"
    });

    sessionStorage.setItem("brewsNav", "1");
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("service-worker.js");
  </script>
