<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="theme-color" content="#6b4f36" />
  <title>BREWS.CO – History</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { align-items: flex-start; }
    .container { max-width: 720px; }

    /* ── Top bar ── */
    .top-bar {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 18px;
    }
    .delete-all-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: #fdf0f0; border: 1.5px solid #f0d5d5; border-radius: var(--radius-md);
      padding: 8px 14px; font-weight: 700; font-size: 0.84rem;
      color: #c0665a; cursor: pointer; font-family: "Plus Jakarta Sans", sans-serif; transition: all .18s;
    }
    .delete-all-btn:hover { background: #fae0de; transform: translateY(-1px); }

    /* ── Month nav ── */
    .month-nav {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 14px;
    }
    .month-nav h2 { margin: 0; font-size: 1.1rem; font-weight: 700; color: var(--mahogany); }
    .month-nav button {
      background: #f0e4d8; border: 1.5px solid #e0c9b8; border-radius: var(--radius-md);
      padding: 7px 13px; font-weight: 700; font-size: 0.88rem;
      cursor: pointer; color: var(--mahogany); font-family: "Plus Jakarta Sans", sans-serif; transition: all .18s;
    }
    .month-nav button:hover { background: #e4d0bf; transform: translateY(-1px); }

    /* ── Calendar ── */
    .cal-wrapper { overflow-x: auto; }
    .calendar {
      width: 100%; border-collapse: separate; border-spacing: 3px;
      margin-bottom: 6px; min-width: 380px;
    }
    .calendar th {
      background: transparent; color: var(--bark); font-weight: 700;
      font-size: 0.68rem; letter-spacing: 0.09em; text-transform: uppercase;
      padding: 5px 4px; text-align: center; border: none;
    }
    .calendar th.week-col { color: var(--mochaccino); font-size: 0.64rem; text-align: right; padding-right: 4px; }
    .calendar td {
      border: 1.5px solid var(--latte); border-radius: var(--radius-md); vertical-align: top;
      height: 66px; padding: 6px; cursor: default; background: var(--pearl); transition: all .14s;
    }
    .calendar td.empty   { background: transparent; border-color: transparent; }
    .calendar td.has-entry {
      cursor: pointer; background: var(--cream); border-color: var(--mochaccino);
      box-shadow: 0 1px 4px rgba(107,61,30,0.08);
    }
    .calendar td.has-entry:hover {
      background: var(--parchment); border-color: #c7a27c;
      box-shadow: 0 3px 10px rgba(107,61,30,0.14); transform: translateY(-1px);
    }
    .calendar td.today { border-color: #c7a27c; box-shadow: 0 0 0 2px rgba(199,162,124,0.28); }
    .calendar td.week-total-cell {
      background: transparent; border-color: transparent;
      text-align: right; vertical-align: middle; cursor: default; height: auto; padding: 0 4px;
    }
    .week-total-val { font-size: 0.68rem; font-weight: 700; color: var(--dust); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .week-total-val.zero { color: #ddd0c4; }
    .day-num { font-size: 0.72rem; font-weight: 600; color: var(--mochaccino); display: block; margin-bottom: 2px; }
    .calendar td.has-entry .day-num { color: var(--mahogany); }
    .calendar td.today .day-num { color: var(--roast); font-weight: 800; }
    .day-total { font-size: 0.72rem; font-weight: 700; color: #9a6e52; line-height: 1.3; }
    .day-badge { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: linear-gradient(135deg,#d4a97c,#9a6e52); margin-top: 4px; }
    .log-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #7ab87a; margin-top: 4px; margin-left: 3px; vertical-align: top; }
    .calendar td .dots-row { display: flex; align-items: center; gap: 2px; margin-top: 3px; }

    /* ── Monthly Summary ── */
    .monthly-summary {
      margin-top: 14px; background: var(--grad-card);
      border-radius: var(--radius-lg); padding: 16px 18px; border: 1.5px solid var(--latte);
    }
    .monthly-summary h3 { margin: 0 0 10px; }
    .summary-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 0; font-size: 0.88rem; color: var(--roast); border-bottom: 1px solid #eddcc9;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-row.sub { padding-left: 14px; color: var(--dust); font-size: 0.82rem; }
    .summary-row.net { font-weight: 700; font-size: 0.96rem; color: var(--mahogany); border-top: 2px solid var(--mochaccino); margin-top: 6px; padding-top: 9px; }
    .summary-row span:last-child { font-variant-numeric: tabular-nums; font-weight: 600; }
    .empty-month { text-align: center; padding: 14px 0 6px; color: var(--dust); font-size: 0.88rem; }

    /* ── Calendar modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(60,38,20,0.42); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--cream); border-radius: var(--radius-lg); padding: 22px;
      max-width: 520px; width: 100%; max-height: 82vh; overflow-y: auto;
      box-shadow: 0 8px 40px rgba(107,61,30,0.2); border: 1.5px solid var(--latte);
      transform: translateY(14px) scale(0.98); transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px; padding-bottom: 11px; border-bottom: 1px solid var(--latte);
    }
    .modal-header h3 { margin: 0; color: var(--mahogany); font-size: 0.96rem; font-weight: 700; border: none; }
    .modal-header-actions { display: flex; gap: 8px; }
    .modal-delete-btn {
      background: #fdf0f0; border: 1.5px solid #f0d5d5; border-radius: var(--radius-md);
      padding: 8px 13px; font-weight: 700; font-size: 0.84rem; color: #c0665a;
      cursor: pointer; font-family: "Plus Jakarta Sans", sans-serif; transition: all .16s;
    }
    .modal-delete-btn:hover { background: #fae0de; }
    .modal-close {
      background: #f0e4d8; border: 1.5px solid #e0c9b8; border-radius: var(--radius-md);
      padding: 8px 13px; font-weight: 700; font-size: 0.84rem;
      color: var(--mahogany); cursor: pointer; font-family: "Plus Jakarta Sans", sans-serif; transition: all .16s;
    }
    .modal-close:hover { background: #e4d0bf; }
    .modal-body table { font-size: 0.84rem; }

    /* ── Retention ── */
    .retention-desc { font-size: 0.84rem; color: var(--bark); margin: 0 0 10px; line-height: 1.5; }
    .retention-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .retention-pill {
      background: #f0e4d8; border: 1.5px solid #e0c9b8; border-radius: var(--radius-pill);
      padding: 8px 16px; font-size: 0.84rem; font-weight: 700; color: var(--mahogany);
      cursor: pointer; font-family: "Plus Jakarta Sans", sans-serif; transition: all .16s;
    }
    .retention-pill:hover { background: #e4d0bf; }
    .retention-pill.active {
      background: var(--grad-cta); color: #fff;
      border-color: transparent; box-shadow: 0 2px 8px rgba(107,61,30,0.26);
    }
    .retention-note { font-size: 0.72rem; color: var(--dust); margin-top: 9px; font-style: italic; }

    /* ── Order Logs ── */
    .order-logs-section { padding-bottom: 28px; }
    .log-empty { text-align: center; color: var(--mochaccino); font-size: 0.84rem; padding: 14px 0; }
    .log-day-item {
      background: var(--cream); border: 1.5px solid var(--latte); border-radius: var(--radius-lg);
      overflow: hidden; margin-bottom: 9px; box-shadow: 0 1px 4px rgba(107,61,30,0.05);
    }
    .log-day-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 14px; cursor: pointer; transition: background .14s;
    }
    .log-day-header:hover { background: var(--parchment); }
    .log-day-left { display: flex; flex-direction: column; gap: 2px; }
    .log-day-date { font-size: 0.84rem; font-weight: 700; color: var(--roast); }
    .log-day-meta { font-size: 0.7rem; color: var(--bark); }
    .log-day-right { display: flex; align-items: center; gap: 9px; }
    .log-day-total { font-size: 0.88rem; font-weight: 700; color: var(--mahogany); font-variant-numeric: tabular-nums; }
    .log-day-chevron { font-size: 0.58rem; color: var(--mochaccino); transition: transform .18s; }
    .log-day-item.expanded .log-day-chevron { transform: rotate(180deg); }
    .log-day-body { border-top: 1px solid #f0e4d8; display: none; }
    .log-day-item.expanded .log-day-body { display: block; }
    .log-order-item {
      border-bottom: 1px solid var(--parchment); padding: 9px 14px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .log-order-item:last-child { border-bottom: none; }
    .log-order-num {
      font-size: 0.68rem; font-weight: 700; color: var(--mochaccino);
      background: var(--parchment); border-radius: 6px; padding: 2px 7px;
      white-space: nowrap; margin-top: 1px; flex-shrink: 0;
    }
    .log-order-num.done-badge { color: #3a7a3a; background: #e6f5e6; }
    .log-order-info { flex: 1; min-width: 0; }
    .log-order-desc    { font-size: 0.82rem; color: var(--roast); font-weight: 600; line-height: 1.4; }
    .log-order-flavors { font-size: 0.7rem; color: var(--bark); margin-top: 1px; }
    .log-order-addons  { font-size: 0.7rem; color: var(--dust); margin-top: 1px; }
    .log-order-payment { font-size: 0.7rem; color: var(--mahogany); margin-top: 2px; }
    .log-order-total   { font-size: 0.82rem; font-weight: 700; color: var(--mahogany); font-variant-numeric: tabular-nums; white-space: nowrap; padding-top: 1px; }
    .log-delete-btn {
      background: #fdf0f0; border: 1.5px solid #f0d5d5; border-radius: 8px;
      padding: 5px 10px; font-size: 0.7rem; font-weight: 700; color: #c0665a;
      cursor: pointer; font-family: "Plus Jakarta Sans", sans-serif; transition: all .14s; flex-shrink: 0;
    }
    .log-delete-btn:hover { background: #fae0de; }

    @media (max-width: 600px) {
      .calendar td { height: 50px; padding: 4px; border-radius: 8px; }
      .day-total { font-size: 0.65rem; }
      .day-num   { font-size: 0.65rem; }
      .modal { padding: 16px; }
    }
    /* ── CSV export button ── */
    .export-csv-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--parchment); border: 1.5px solid var(--latte);
      border-radius: var(--radius-md); padding: 8px 14px; font-weight: 700;
      font-size: 0.84rem; color: var(--mahogany); cursor: pointer;
      font-family: "Plus Jakarta Sans", sans-serif; transition: all .18s;
    }
    .export-csv-btn:hover { background: var(--latte); transform: translateY(-1px); }

    /* ── Offline pill ── */
    .offline-pill {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, #8B2500, #C04020);
      color: #fff; padding: 8px 18px; border-radius: var(--radius-pill);
      font-size: 0.78rem; font-weight: 700; z-index: 800;
      box-shadow: 0 3px 14px rgba(180,60,0,0.35);
      opacity: 0; pointer-events: none; transition: opacity .3s;
      white-space: nowrap;
    }
    .offline-pill.visible { opacity: 1; pointer-events: all; }

    .pull-cloud-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: #f0f7f0; border: 1.5px solid #b8ddb8; border-radius: var(--radius-md);
      padding: 8px 14px; font-weight: 700; font-size: 0.84rem;
      color: #3a7a3a; cursor: pointer; font-family: "Plus Jakarta Sans", sans-serif; transition: all .18s;
    }
    .pull-cloud-btn:hover { background: #e0f0e0; transform: translateY(-1px); }
    .pull-cloud-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
    #calSyncToast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      padding: 9px 20px; border-radius: var(--radius-pill); font-size: 0.82rem; font-weight: 600;
      color: #fff; z-index: 9999; opacity: 0; transition: opacity .3s;
      white-space: nowrap; box-shadow: 0 3px 14px rgba(0,0,0,0.22);
      pointer-events: none; background: var(--roast);
    }
    /* Manager: no bottom nav, toast sits lower */
    body:not(.has-bottom-nav) #calSyncToast { bottom: 20px; }
  </style>
</head>
<body class="has-bottom-nav">
<div class="container">

  <div id="calSyncToast"></div>
  <div class="offline-pill" id="calOfflinePill">📡 Offline — changes save locally</div>

  <div class="top-bar">
    <a href="index.html" class="back-btn">← Back</a>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="export-csv-btn" id="calExportBtn" onclick="exportHistoryCSV()"
        style="display:none;">📊 Export CSV</button>
      <button class="pull-cloud-btn" id="calPullBtn" onclick="calPullFromCloud()"
        style="display:none;">⬇️ Pull Cloud</button>
      <button class="delete-all-btn" onclick="deleteAllHistory()">🗑 Delete All</button>
    </div>
  </div>

  <a href="index.html" style="text-decoration:none;display:block;text-align:center;">
    <div class="brand">BREWS.CO</div>
    <div class="brand-sub">History</div>
  </a>

  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8592;</button>
    <h2 id="monthTitle"></h2>
    <button onclick="changeMonth(1)">&#8594;</button>
  </div>

  <div class="cal-wrapper">
    <table class="calendar" id="calendarTable">
      <thead>
        <tr>
          <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th>
          <th>Thu</th><th>Fri</th><th>Sat</th>
          <th class="week-col">Week</th>
        </tr>
      </thead>
      <tbody id="calendarBody"></tbody>
    </table>
  </div>
  <div style="display:flex;gap:14px;padding:4px 2px 2px;font-size:0.72rem;color:var(--bark);">
    <span style="display:flex;align-items:center;gap:5px;">
      <span style="width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,#d4a97c,#9a6e52);display:inline-block;"></span> Inventory saved
    </span>
    <span style="display:flex;align-items:center;gap:5px;">
      <span style="width:7px;height:7px;border-radius:50%;background:#7ab87a;display:inline-block;"></span> Order log saved
    </span>
  </div>

  <div class="section monthly-exp-section">
    <h3>Monthly Expenses</h3>
    <div id="monthlyExpContainer"></div>
    <button class="add-expense-btn" onclick="addMonthlyExpRow()">+ Add Monthly Expense</button>
  </div>

  <div class="monthly-summary" id="monthlySummary"></div>

  <!-- Retention Settings -->
  <div class="section retention-section">
    <h3>Order Log Retention</h3>
    <p class="retention-desc">Saved shift orders auto-delete after a set period. Choose how long to keep them:</p>
    <div class="retention-pills" id="retentionPills"></div>
    <p class="retention-note" id="retentionNote"></p>
  </div>

  <!-- Saved Order Logs -->
  <div class="section order-logs-section">
    <h3>Saved Order Logs</h3>
    <div id="orderLogsContainer"></div>
  </div>
</div>

<!-- Receipt Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalDate"></h3>
      <div class="modal-header-actions">
        <button class="modal-delete-btn" onclick="deleteCurrentEntry()">🗑 Delete</button>
        <button class="modal-close" onclick="closeModal()">✕ Close</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" onerror="console.warn('Firebase CDN unavailable')"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js" onerror="console.warn('Firebase CDN unavailable')"></script>
<script>
  if (typeof window.syncPull      !== "function") window.syncPull      = async () => { throw new Error("Sync unavailable"); };
  if (typeof window.getDeviceRole !== "function") window.getDeviceRole = () => localStorage.getItem("brewsDeviceRole") || "worker";
</script>
<script src="js/sync.js" onerror="console.warn('sync.js not found')"></script>
<script>
  const today    = new Date();
  let curYear    = today.getFullYear();
  let curMonth   = today.getMonth();
  let currentModalDate = "";

  const MONTH_NAMES = ["January","February","March","April","May","June",
                       "July","August","September","October","November","December"];

  function formatMoney(value) {
    return "₱" + Number(value||0).toLocaleString("en-PH",{minimumFractionDigits:2,maximumFractionDigits:2});
  }

  function extractFinalTotal(html) {
    const div = document.createElement("div");
    div.innerHTML = html;
    for (const row of div.querySelectorAll("tr")) {
      const cells = row.querySelectorAll("td");
      if (cells.length >= 2 && cells[0].textContent.includes("Final Total"))
        return cells[1].textContent.trim();
    }
    return null;
  }

  function parseMoney(str) {
    return parseFloat((str||"").replace(/[₱,]/g,"")) || 0;
  }

  // ── Monthly Expenses ─────────────────────────────────────────────────────
  function monthKey() {
    return `brewsMonthlyExp_${curYear}-${String(curMonth+1).padStart(2,"0")}`;
  }

  function saveMonthlyExpenses() {
    const rows = document.querySelectorAll("#monthlyExpContainer .expense-row");
    const list = [];
    rows.forEach(r => {
      const name  = r.querySelector(".exp-name").value.trim();
      const price = parseFloat(r.querySelector(".exp-price").value) || 0;
      if (name || price) list.push({name, price});
    });
    localStorage.setItem(monthKey(), JSON.stringify(list));
    renderSummary();
  }

  function loadMonthlyExpenses() {
    try { return JSON.parse(localStorage.getItem(monthKey())) || []; } catch { return []; }
  }

  function addMonthlyExpRow(name="", price="") {
    const container = document.getElementById("monthlyExpContainer");
    const row = document.createElement("div");
    row.className = "expense-row";
    row.innerHTML = `
      <input type="text"   class="exp-name"  placeholder="Expense name" value="${name}">
      <input type="number" class="exp-price" placeholder="₱0"           value="${price}">
      <button type="button" onclick="this.parentElement.remove(); saveMonthlyExpenses();">x</button>
    `;
    row.addEventListener("input", saveMonthlyExpenses);
    container.appendChild(row);
  }

  function renderMonthlyExpenses() {
    const container = document.getElementById("monthlyExpContainer");
    container.innerHTML = "";
    const list = loadMonthlyExpenses();
    if (list.length) list.forEach(e => addMonthlyExpRow(e.name, e.price));
    else addMonthlyExpRow();
  }

  // ── Calendar ─────────────────────────────────────────────────────────────
  function renderCalendar() {
    document.getElementById("monthTitle").textContent = `${MONTH_NAMES[curMonth]} ${curYear}`;

    const history     = getAllHistory();
    const firstDay    = new Date(curYear, curMonth, 1).getDay();
    const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
    const todayStr    = today.toISOString().split("T")[0];

    const entryMap = {};
    history.forEach(h => { entryMap[h.date] = h; });

    // Build set of dates that have saved POS order logs
    const orderLogs  = JSON.parse(localStorage.getItem(ORDER_LOG_KEY) || "[]");
    const logDateSet = new Set(orderLogs.map(l => l.date));

    const tbody = document.getElementById("calendarBody");
    tbody.innerHTML = "";

    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i += 7) {
      const tr = document.createElement("tr");
      let weekTotal = 0;

      for (let j = 0; j < 7; j++) {
        const cell    = i + j;
        const day     = cell - firstDay + 1;
        const td      = document.createElement("td");

        if (cell < firstDay || day > daysInMonth) {
          td.classList.add("empty");
        } else {
          const dateStr  = `${curYear}-${String(curMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const entry    = entryMap[dateStr];
          const hasLog   = logDateSet.has(dateStr);
          td.innerHTML   = `<span class="day-num">${day}</span>`;

          if (entry) {
            const totalStr = extractFinalTotal(entry.results);
            const totalNum = parseMoney(totalStr);
            weekTotal += totalNum;
            td.classList.add("has-entry");
            if (totalStr) td.innerHTML += `<div class="day-total">${totalStr}</div>`;
          }

          // Dots row — brown dot for inventory save, green dot for order log
          if (entry || hasLog) {
            const dots = `<div class="dots-row">
              ${entry   ? `<span class="day-badge" title="Inventory saved"></span>` : ""}
              ${hasLog  ? `<span class="log-dot"   title="Order log saved"></span>` : ""}
            </div>`;
            td.innerHTML += dots;
            if (!td.classList.contains("has-entry")) td.classList.add("has-entry");
          }

          if (entry) td.addEventListener("click", () => openModal(dateStr, entry));
          else if (hasLog) td.addEventListener("click", () => {
            document.getElementById("orderLogsContainer")
              ?.querySelector(`#logday-${dateStr}`)
              ?.scrollIntoView({ behavior: "smooth", block: "center" });
            // also expand it
            document.getElementById(`logday-${dateStr}`)?.classList.add("expanded");
          });

          if (dateStr === todayStr) td.classList.add("today");
        }

        tr.appendChild(td);
      }

      // Week total cell
      const wtd = document.createElement("td");
      wtd.className = "week-total-cell";
      wtd.innerHTML = weekTotal > 0
        ? `<span class="week-total-val">${formatMoney(weekTotal)}</span>`
        : `<span class="week-total-val zero">—</span>`;
      tr.appendChild(wtd);
      tbody.appendChild(tr);
    }

    renderMonthlyExpenses();
    renderSummary();
  }

  // ── Monthly Summary ───────────────────────────────────────────────────────
  function renderSummary() {
    const history = getAllHistory();
    const prefix  = `${curYear}-${String(curMonth+1).padStart(2,"0")}`;

    let totalRevenue = 0;
    history.forEach(h => {
      if (h.date.startsWith(prefix)) totalRevenue += parseMoney(extractFinalTotal(h.results));
    });

    const expList  = loadMonthlyExpenses().filter(e => e.name && e.price > 0);
    const totalExp = expList.reduce((s,e) => s + e.price, 0);
    const net      = totalRevenue - totalExp;
    const el       = document.getElementById("monthlySummary");

    if (totalRevenue === 0 && expList.length === 0) {
      el.innerHTML = `<h3>Monthly Summary</h3><p class="empty-month">No entries for ${MONTH_NAMES[curMonth]} ${curYear}.</p>`;
      return;
    }

    let html = `<h3>Monthly Summary — ${MONTH_NAMES[curMonth]} ${curYear}</h3>
      <div class="summary-row"><span>Total Daily Revenue</span><span>${formatMoney(totalRevenue)}</span></div>`;

    if (expList.length) {
      html += `<div class="summary-row"><span>Monthly Expenses</span><span>- ${formatMoney(totalExp)}</span></div>`;
      expList.forEach(e => { html += `<div class="summary-row sub"><span>${e.name}</span><span>- ${formatMoney(e.price)}</span></div>`; });
    }

    html += `<div class="summary-row net"><span>Net Monthly Income</span><span>${formatMoney(net)}</span></div>`;
    el.innerHTML = html;
  }

  // ── Month nav ─────────────────────────────────────────────────────────────
  function changeMonth(dir) {
    curMonth += dir;
    if (curMonth > 11) { curMonth = 0;  curYear++; }
    if (curMonth < 0)  { curMonth = 11; curYear--; }
    renderCalendar();
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  function openModal(dateStr, entry) {
    currentModalDate = dateStr;
    document.getElementById("modalDate").textContent = `Receipt — ${dateStr}`;
    document.getElementById("modalBody").innerHTML   = entry.results;
    document.getElementById("modalOverlay").classList.add("open");
  }

  function closeModal() {
    document.getElementById("modalOverlay").classList.remove("open");
    currentModalDate = "";
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById("modalOverlay")) closeModal();
  }

  function deleteCurrentEntry() {
    if (!currentModalDate) return;
    if (!confirm(`Delete entry for ${currentModalDate}?`)) return;
    deleteHistoryByDate(currentModalDate);
    closeModal();
    renderCalendar();
  }

  function deleteAllHistory() {
    if (!confirm("Delete ALL inventory history and order logs? This cannot be undone.")) return;
    clearAllHistory();
    localStorage.removeItem(ORDER_LOG_KEY);
    renderCalendar();
    renderOrderLogs();
  }

  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  // Swipe to dismiss receipt modal
  (function() {
    const overlay = document.getElementById("modalOverlay");
    const modal   = overlay?.querySelector(".modal");
    if (!overlay || !modal) return;
    let startY = 0, dragging = false, curY = 0;
    overlay.addEventListener("touchstart", e => {
      if (e.target === overlay) return;
      startY = e.touches[0].clientY; curY = startY; dragging = true;
      modal.style.transition = "none";
    }, { passive: true });
    overlay.addEventListener("touchmove", e => {
      if (!dragging) return;
      curY = e.touches[0].clientY;
      const dy = Math.max(0, curY - startY);
      modal.style.transform = `translateY(${dy}px) scale(${1 - dy*0.0005})`;
    }, { passive: true });
    overlay.addEventListener("touchend", () => {
      if (!dragging) return; dragging = false;
      const dy = Math.max(0, curY - startY);
      modal.style.transition = "";
      if (dy > 90) { modal.style.transform = ""; closeModal(); }
      else modal.style.transform = "";
    });
  })();

  // ══════════════════════════════════════════════════════
  //  ORDER LOG RETENTION & DISPLAY
  // ══════════════════════════════════════════════════════
  const ORDER_LOG_KEY  = "brewsOrderLog";
  const RETENTION_KEY  = "brewsOrderRetention";
  const ADDONS_PRICES  = {
    "Pearl":6,"Nata":6,"Coffee Jelly":6,"Oreo":6,"Cream Cheese":10,"Espresso Shot":6
  };

  const RETENTION_OPTIONS = [
    { label: "3 Days",  days: 3  },
    { label: "1 Week",  days: 7  },
    { label: "2 Weeks", days: 14 },
    { label: "1 Month", days: 30 },
  ];

  function getRetentionDays() {
    return parseInt(localStorage.getItem(RETENTION_KEY) || "7");
  }

  function setRetention(days) {
    localStorage.setItem(RETENTION_KEY, days);
    cleanupOrderLogs();
    renderRetentionPills();
    renderOrderLogs();
  }

  function cleanupOrderLogs() {
    const days   = getRetentionDays();
    const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
    const logs   = JSON.parse(localStorage.getItem(ORDER_LOG_KEY) || "[]");
    const kept   = logs.filter(l => {
      const ts = l.savedAt || new Date(l.date + "T23:59:59").getTime();
      return ts > cutoff;
    });
    localStorage.setItem(ORDER_LOG_KEY, JSON.stringify(kept));
  }

  function deleteOrderLog(date) {
    if (!confirm(`Delete order log for ${date}?`)) return;
    const logs = JSON.parse(localStorage.getItem(ORDER_LOG_KEY) || "[]");
    localStorage.setItem(ORDER_LOG_KEY, JSON.stringify(logs.filter(l => l.date !== date)));
    renderOrderLogs();
  }

  function renderRetentionPills() {
    const current = getRetentionDays();
    const container = document.getElementById("retentionPills");
    const note      = document.getElementById("retentionNote");
    container.innerHTML = "";
    RETENTION_OPTIONS.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "retention-pill" + (opt.days === current ? " active" : "");
      btn.textContent = opt.label;
      btn.addEventListener("click", () => setRetention(opt.days));
      container.appendChild(btn);
    });
    const opt = RETENTION_OPTIONS.find(o => o.days === current) || RETENTION_OPTIONS[1];
    note.textContent = `Currently keeping logs for ${opt.label.toLowerCase()}. Older logs are deleted automatically on page load.`;
  }

  function renderOrderLogs() {
    const container = document.getElementById("orderLogsContainer");
    const raw       = localStorage.getItem(ORDER_LOG_KEY);
    const logs      = raw ? JSON.parse(raw) : [];

    if (!logs.length) {
      container.innerHTML = `<div class="log-empty">No saved order logs yet. Logs appear here after you end a shift in the POS.</div>`;
      return;
    }

    // Sort newest first
    const sorted = [...logs].sort((a, b) => b.date.localeCompare(a.date));

    container.innerHTML = sorted.map(log => {
      const orders    = log.orders || [];
      const dayTotal  = orders.reduce((s, o) => s + (o.total || 0), 0);
      const doneCount = orders.filter(o => o.done).length;

      const orderRows = orders.map(order => {
        const desc = order.items.map(i => `${i.qty}×${i.code}`).join(", ");
        const flavors = order.items.filter(i => i.flavor).map(i => `${i.code}: ${i.flavor}`).join(" · ");
        const addons  = Object.entries(order.addons || {})
          .map(([n, q]) => `${q}× ${n}`).join(", ");
        const change  = order.given > 0 ? order.given - order.total : null;
        const isDone  = !!order.done;
        return `
          <div class="log-order-item">
            <span class="log-order-num${isDone ? " done-badge" : ""}">#${order.id}${isDone ? " ✓" : ""}</span>
            <div class="log-order-info">
              <div class="log-order-desc">${desc} — ${formatMoney(order.total)}</div>
              ${flavors ? `<div class="log-order-flavors">🍵 ${flavors}</div>` : ""}
              ${addons  ? `<div class="log-order-addons">+ ${addons}</div>` : ""}
              ${order.given > 0 ? `<div class="log-order-payment">Given ${formatMoney(order.given)} · ${change >= 0 ? "Change" : "Short"} ${formatMoney(Math.abs(change))}</div>` : ""}
            </div>
            <span class="log-order-total">${order.time || ""}</span>
          </div>`;
      }).join("");

      return `
        <div class="log-day-item" id="logday-${log.date}">
          <div class="log-day-header" onclick="document.getElementById('logday-${log.date}').classList.toggle('expanded')">
            <div class="log-day-left">
              <span class="log-day-date">${log.date}</span>
              <span class="log-day-meta">${orders.length} order${orders.length !== 1 ? "s" : ""} · ${doneCount} done</span>
            </div>
            <div class="log-day-right">
              <span class="log-day-total">${formatMoney(dayTotal)}</span>
              <button class="log-delete-btn" onclick="event.stopPropagation();deleteOrderLog('${log.date}')">🗑</button>
              <span class="log-day-chevron">▼</span>
            </div>
          </div>
          <div class="log-day-body">${orderRows}</div>
        </div>`;
    }).join("");
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  cleanupOrderLogs();
  renderRetentionPills();
  renderOrderLogs();
  renderCalendar();

  // ── Role-based setup ────────────────────────────────────────────────────────
  (function initCalRole() {
    const role = getDeviceRole();
    const isManager = role === "manager";

    const pullBtn   = document.getElementById("calPullBtn");
    const exportBtn = document.getElementById("calExportBtn");
    if (pullBtn   && isManager) pullBtn.style.display   = "inline-flex";
    if (exportBtn && isManager) exportBtn.style.display = "inline-flex";

    if (isManager) {
      const nav = document.querySelector(".bottom-nav");
      if (nav) nav.style.display = "none";
      document.body.classList.remove("has-bottom-nav");
    }

    // Offline indicator
    const pill = document.getElementById("calOfflinePill");
    function setOffline(v) { if (pill) pill.classList.toggle("visible", v); }
    window.addEventListener("online",  () => setOffline(false));
    window.addEventListener("offline", () => setOffline(true));
    if (!navigator.onLine) setOffline(true);
  })();

  // Manager pull function
  async function calPullFromCloud() {
    const btn = document.getElementById("calPullBtn");
    if (btn) { btn.disabled = true; btn.textContent = "⬇️ Pulling…"; }
    _showCalToast("Pulling from cloud…", "var(--mahogany)", false);
    try {
      await syncPull(); // manager pull = full replace
      cleanupOrderLogs(); renderRetentionPills(); renderOrderLogs(); renderCalendar();
      _showCalToast("✓ History updated from cloud", "#3a7a3a", true);
    } catch (e) {
      _showCalToast("⚠ " + (e.message || "Pull failed"), "#c0665a", true);
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = "⬇️ Pull Cloud"; }
    }
  }

  // ── CSV Export ────────────────────────────────────────────────────────────
  function exportHistoryCSV() {
    const history = getAllHistory();
    if (!history.length) { _showCalToast("No history to export", "#c0665a", true); return; }

    // Parse receipt HTML to extract summary rows
    function parseEntry(html) {
      const d = document.createElement("div");
      d.innerHTML = html;
      const rows = {};
      d.querySelectorAll("tr").forEach(tr => {
        const cells = tr.querySelectorAll("td");
        if (cells.length >= 2) {
          const key = cells[0].textContent.trim();
          const val = cells[cells.length-1].textContent.replace(/[₱,]/g,"").trim();
          rows[key] = val;
        }
      });
      return rows;
    }

    const lines = [];
    // Header
    lines.push([
      "Date","Total Cup Sales","Salary","Total Expenses","Gross Income","Add-ons","Final Total"
    ].join(","));

    history.forEach(h => {
      const rows = parseEntry(h.results);
      const get  = (...keys) => {
        for (const k of keys) {
          for (const rk of Object.keys(rows)) {
            if (rk.toLowerCase().includes(k.toLowerCase())) return rows[rk] || "0";
          }
        }
        return "0";
      };
      lines.push([
        h.date,
        get("Total Cup Sales"),
        get("Salary"),
        get("Total Expenses"),
        get("Gross Income"),
        get("Add-on"),
        get("Final Total"),
      ].map(v => `"${v}"`).join(","));
    });

    const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    const monthStr = MONTH_NAMES[curMonth] + "_" + curYear;
    a.href     = url;
    a.download = "BREWSCO_history_" + monthStr + ".csv";
    a.click();
    URL.revokeObjectURL(url);
    _showCalToast("✓ CSV downloaded", "#3a7a3a", true);
  }

  function _showCalToast(msg, color, autoDismiss) {
    const t = document.getElementById("calSyncToast");
    if (!t) return;
    clearTimeout(t._timer);
    t.textContent = msg; t.style.background = color; t.style.opacity = "1";
    if (autoDismiss) t._timer = setTimeout(() => { t.style.opacity = "0"; }, 3000);
  }
</script>
